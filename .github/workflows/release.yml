name: Release

on:
  push:
    tags: ['v*']
  # Manual re-runs against an existing tag without force-pushing. Set
  # `ref` to the tag (e.g. `v0.2.0`) when dispatching.
  workflow_dispatch:

permissions:
  contents: write    # upload release assets
  id-token: write    # PyPI trusted publishing (OIDC) + sigstore attestation
  attestations: write  # actions/attest-build-provenance

jobs:
  guard:
    name: tag matches pyproject.toml version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'  # tomllib needs >=3.11
      - name: Verify tag == pyproject.toml == __init__.py
        run: |
          tag="${GITHUB_REF_NAME#v}"
          py_ver=$(python -c 'import tomllib;print(tomllib.loads(open("pyproject.toml","rb").read().decode())["project"]["version"])')
          init_ver=$(python -c 'import ast;m=ast.parse(open("src/shimkit/__init__.py").read());\
          v=[n.value.value for n in m.body if isinstance(n, ast.Assign) and n.targets[0].id=="__version__"][0];print(v)')
          echo "tag:           $tag"
          echo "pyproject:     $py_ver"
          echo "__init__.py:   $init_ver"
          if [ "$tag" != "$py_ver" ] || [ "$tag" != "$init_ver" ]; then
            echo "::error::Version drift: tag=$tag, pyproject=$py_ver, __init__=$init_ver"
            exit 1
          fi
      - name: Verify CHANGELOG has an Unreleased section or a matching version heading
        run: |
          tag="${GITHUB_REF_NAME#v}"
          if grep -qE "^## \[${tag}\]|^## \[Unreleased\]" CHANGELOG.md; then
            echo "OK: CHANGELOG entry present"
          else
            echo "::error::CHANGELOG.md missing entry for [${tag}] or [Unreleased]"
            exit 1
          fi

  build:
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Generate SBOM for the wheel
        uses: anchore/sbom-action@v0
        with:
          path: ./dist
          format: spdx-json
          artifact-name: shimkit-sbom.spdx.json
          output-file: ./dist/shimkit-sbom.spdx.json
      - name: Attest build provenance for wheel + sdist
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi    # tie OIDC trust to this environment
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/shimkit-sbom.spdx.json

  bump-homebrew-tap:
    needs: publish-pypi
    runs-on: ubuntu-latest
    if: github.repository == 'simtabi/shimkit'
    steps:
      - name: Bump formula in homebrew-tap
        uses: dawidd6/action-homebrew-bump-formula@v7
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          tap: simtabi/homebrew-tap
          formula: shimkit
        continue-on-error: true   # tap may not exist yet on first release

  publish-ghcr:
    name: Publish container to GHCR
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      # contents: write so anchore/sbom-action can attach the
      # container SBOM to the GitHub Release page (default
      # upload-release-assets=true on tag refs). Without write, the
      # action errors "Resource not accessible by integration".
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - id: build-push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Attest container build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true
      - name: Generate container SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build-push.outputs.digest }}
          format: spdx-json
          artifact-name: shimkit-container-sbom.spdx.json
          upload-artifact: true
