name: Release

on:
  push:
    tags: ['v*']
  # Manual re-runs against an existing tag without force-pushing. Set
  # `ref` to the tag (e.g. `v0.2.0`) when dispatching.
  workflow_dispatch:

permissions:
  contents: write    # upload release assets
  id-token: write    # PyPI trusted publishing (OIDC) + sigstore attestation
  attestations: write  # actions/attest-build-provenance

jobs:
  guard:
    name: tag matches pyproject.toml version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'  # tomllib needs >=3.11
      - name: Verify tag == pyproject.toml == __init__.py
        run: |
          tag="${GITHUB_REF_NAME#v}"
          py_ver=$(python -c 'import tomllib;print(tomllib.loads(open("pyproject.toml","rb").read().decode())["project"]["version"])')
          init_ver=$(python -c 'import ast;m=ast.parse(open("src/shimkit/__init__.py").read());\
          v=[n.value.value for n in m.body if isinstance(n, ast.Assign) and n.targets[0].id=="__version__"][0];print(v)')
          echo "tag:           $tag"
          echo "pyproject:     $py_ver"
          echo "__init__.py:   $init_ver"
          if [ "$tag" != "$py_ver" ] || [ "$tag" != "$init_ver" ]; then
            echo "::error::Version drift: tag=$tag, pyproject=$py_ver, __init__=$init_ver"
            exit 1
          fi
      - name: Verify CHANGELOG has an Unreleased section or a matching version heading
        run: |
          tag="${GITHUB_REF_NAME#v}"
          if grep -qE "^## \[${tag}\]|^## \[Unreleased\]" CHANGELOG.md; then
            echo "OK: CHANGELOG entry present"
          else
            echo "::error::CHANGELOG.md missing entry for [${tag}] or [Unreleased]"
            exit 1
          fi

  build:
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Generate SBOM for the wheel
        uses: anchore/sbom-action@v0
        with:
          path: ./dist
          format: spdx-json
          artifact-name: shimkit-sbom.spdx.json
          output-file: ./dist/shimkit-sbom.spdx.json
      - name: Attest build provenance for wheel + sdist
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # PyPI publishing — restored in v0.11.0 after sitting deferred from
  # v0.5.0 through v0.10.0 (six releases shipped to GitHub Releases
  # only). The job runs in the `pypi` GitHub Environment so trusted
  # publishing (OIDC) can sign the upload without long-lived tokens.
  #
  # PREREQUISITES (one-time, on the user's side):
  #   1. https://pypi.org/manage/account/publishing/ → add a pending
  #      publisher: Owner=simtabi, Repository=shimkit,
  #      Workflow=release.yml, Environment=pypi,
  #      PyPI Project Name=shimkit
  #   2. GitHub repo Settings → Environments → New environment "pypi".
  #      No secrets required; OIDC provides credentials at runtime.
  #
  # If either step is missing the upload fails with `invalid-publisher`.
  # See docs/release.md for the full restoration recipe.
  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Stage wheel + sdist only for PyPI
        # The SBOM lives in dist/ for GitHub Release upload but PyPI
        # rejects unknown artifacts. Copy just *.whl + *.tar.gz into
        # a separate dir.
        run: |
          mkdir -p dist-pypi
          cp dist/*.whl dist-pypi/
          cp dist/*.tar.gz dist-pypi/
          ls -la dist-pypi/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-pypi/
          # We already attest provenance in the build job above.
          attestations: false
          # Re-runs against an existing tag (workflow_dispatch path)
          # would otherwise fail when the version is already on PyPI.
          skip-existing: true

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/shimkit-sbom.spdx.json

  # Smoke-verify the attestation on the published artifacts. This
  # catches a misconfiguration of the publish flow — `actions/attest-
  # build-provenance` publishes attestations to Sigstore's
  # transparency log; this job reads them back via `gh attestation
  # verify` and asserts they match the artifacts attached to the
  # release. Tracked as optional in known-issues.md before v0.12.0.
  verify-attestation:
    needs: github-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read
    steps:
      - uses: actions/checkout@v6
      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern '*.whl' \
            --pattern '*.tar.gz' \
            --dir dist/
          ls -la dist/
      - name: Verify attestation on wheel + sdist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for artifact in dist/*.whl dist/*.tar.gz; do
            echo "::group::Verify $artifact"
            gh attestation verify "$artifact" \
              --owner "${GITHUB_REPOSITORY%%/*}"
            echo "::endgroup::"
          done
