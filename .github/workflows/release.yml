name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write    # upload release assets
  id-token: write    # PyPI trusted publishing (OIDC)

jobs:
  guard:
    name: tag matches pyproject.toml version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # tomllib needs >=3.11
      - name: Verify tag == pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver=$(python -c 'import tomllib;print(tomllib.loads(open("pyproject.toml","rb").read().decode())["project"]["version"])')
          echo "tag:        $tag"
          echo "pyproject:  $ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::Tag v${tag} does not match pyproject.toml version ${ver}"
            exit 1
          fi

  build:
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Generate install.sh checksum
        run: |
          cd installer
          sha256sum install.sh > install.sh.sha256
          cat install.sh.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/upload-artifact@v4
        with:
          name: installer
          path: |
            installer/install.sh
            installer/install.sh.sha256

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi    # tie OIDC trust to this environment
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: installer
          path: installer/
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            installer/install.sh
            installer/install.sh.sha256
            dist/*.whl
            dist/*.tar.gz

  bump-homebrew-tap:
    needs: publish-pypi
    runs-on: ubuntu-latest
    if: github.repository == 'simtabi/shimkit'
    steps:
      - name: Bump formula in homebrew-tap
        uses: dawidd6/action-homebrew-bump-formula@v7
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          tap: simtabi/homebrew-tap
          formula: shimkit
        continue-on-error: true   # tap may not exist yet on first release

  publish-ghcr:
    name: Publish container to GHCR
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
